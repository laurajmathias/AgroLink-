<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroLink</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <a href="#" class="logo">
               <img src="assets/agrolink-sem-fundo.png" alt="Logotipo-Agrolink">
            </a>
            <nav class="nav-bar">
                <a href="home">Inicio</a>
                <a href="about">Sobre</a>
                <a href="services">Serviços</a>
                <a href="project">Projeto</a>
                <a href="contato">Contato</a>
            </nav>
            <div class="nav-buttons">

                <button class="bnt-outline">
                    Login
                </button>

                <button class="bnt-primary">
                    Começar Agora
                </button>
            </div>
        </div>

    </header>

    <section class="hero" id="home">

        <div class="slider">

                <div class="slide-active">
                    <img src="assets/" alt="aqui terá a imagem 1 do carrossel">
                    <div class="overlay"></div>
                    <div class="hero-content">
                        <span class="tag">
                            Logística - Impoulso econômico - Parceria 
                        </span>

                        <h1>Impulsionando o Coméricio Rural</h1>
                        <p>Otimizando os processos logísticos e inserindo os produtores rurais no cenário comercial atual</p>
                        <a href="services" class="bnt-primary">Saiba Mais</a>
                    </div>
                </div>
        </div>

    </section>

</body>
</html>
